<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviewing - Erablox</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000008; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .menu-icon { align-self: flex-start; border: 3px solid white; border-radius: 12px; padding: 8px; margin-bottom: 50px; }
        .bar { width: 35px; height: 5px; background: white; margin: 6px; border-radius: 2px; }
        
        .status-card { border: 2px solid white; width: 100%; max-width: 340px; border-radius: 8px; overflow: hidden; }
        .section { border-bottom: 2px solid white; padding: 20px; }
        .section:last-child { border-bottom: none; }
        
        .title { font-size: 42px; font-weight: 500; }
        .message { font-size: 26px; line-height: 1.2; }
        .status-text { font-size: 24px; }
        #status-val { font-weight: bold; }
        .date-info { font-size: 20px; line-height: 1.4; }

        /* Контейнер для ссылки на регистрацию */
        #reg-box { 
            display: none; margin-top: 15px; padding-top: 10px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
        }
        .reg-link { color: #5db3d5; text-decoration: underline; font-weight: bold; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>

    <div class="status-card">
        <div class="section title">Application</div>
        <div class="section message" id="main-msg">Your application is reviewing please wait</div>
        <div class="section status-text">Status: <span id="status-val">reviewing</span></div>
        <div class="section date-info">
            Date of sending: <span id="d">00.00.0000</span><br>
            Time of sending: <span id="t">00:00</span>
            
            <div id="reg-box">
                <a href="signup.html" class="reg-link">REGISTER ACCOUNT</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './auth.js';
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const appId = localStorage.getItem('last_app_id');

        if (appId) {
            onSnapshot(doc(db, "ErabloxUsers", appId), (snap) => {
                const data = snap.data();
                if (!data) return;

                document.getElementById('d').innerText = data.date;
                document.getElementById('t').innerText = data.time;

                if (data.status === "accepted") {
                    const s = document.getElementById('status-val');
                    s.innerText = "accepted";
                    s.style.color = "#00ff00";
                    document.getElementById('main-msg').innerText = "Your application is accepted!";
                    document.getElementById('reg-box').style.display = "block";
                }
            });
        }
    </script>
</body>
</html>
