<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erablox Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        /* Основные стили страницы */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Синяя шапка "Admin Panel" как на твоем макете */
        .header {
            background-color: #4A4AFF;
            width: 100%;
            padding: 25px 0;
            text-align: center;
            color: #000000;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Сетка для карточек */
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        /* Белая карточка заявки */
        .card {
            background: #fff;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 25px;
            width: 280px;
            text-align: center;
            box-shadow: 4px 4px 0px #000;
        }

        .card-id {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .view-link {
            display: block;
            margin: 15px 0;
            font-size: 20px;
            color: #000;
            text-decoration: none;
            cursor: pointer;
            line-height: 1.2;
        }

        /* Кнопки Галочка и Крестик */
        .actions {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .btn-action {
            width: 90px;
            height: 55px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .btn-action:active { transform: scale(0.9); }

        .btn-approve { background-color: #32CD32; color: #004d00; }
        .btn-reject { background-color: #FF4D4D; color: #4d0000; }

        /* --- Темное окно Information (Modal) --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050510; /* Темный фон из скрина */
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            color: white;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-header {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
        }

        .menu-btn {
            border: 3px solid white;
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 30px;
            background: none;
            color: white;
        }

        .modal-title {
            flex-grow: 1;
            text-align: center;
            font-size: 40px;
            font-weight: normal;
        }

        /* Поля ввода в темной теме */
        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
            align-self: center;
        }

        .info-number {
            font-size: 60px;
            font-weight: bold;
            margin-right: 25px;
            min-width: 60px;
        }

        .info-field {
            background-color: white;
            color: black;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 24px;
            width: 100%;
        }

        /* Кнопка Back */
        .btn-back {
            background-color: #88B08B; /* Зеленоватый цвет со скрина */
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px 80px;
            font-size: 36px;
            align-self: center;
            margin-top: auto;
            margin-bottom: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="content" id="apps-list">
        </div>

    <div class="modal" id="info-modal">

            <button class="menu-btn">☰</button>

        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="info-row">
                <span class="info-number">1.</span>
                <input type="text" id="modal-field-1" class="info-field">
            </div>
            <div class="info-row">
                <span class="info-number">2.</span>
                <input type="text" id="modal-field-2" class="info-field">
            </div>
            <div class="info-row">
                <span class="info-number">3.</span>
                <input type="text" id="modal-field-3" class="info-field">
            </div>
        </div>

        <button class="btn-back" onclick="closeModal()">Back ⬅</button>
    </div>

                }
            });
        }

            document.getElementById('info-modal').style.display = 'none';
