<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Erablox</title>
    <style>
        /* Весь CSS из дизайна со скриншота */
        body {
            background-color: #F2F4F5;
            font-family: "HCo Gotham SSm", Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; color: #404040;
        }

        /* Синяя шапка */
        .top-bar {
            background-color: #0074BD;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            color: white;
        }

        /* Черная навигация */
        .nav-menu {
            background-color: #000;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-menu a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; }
        .search-box { 
            background: white; border: none; padding: 5px 10px; 
            width: 250px; border-radius: 3px; font-size: 13px;
        }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 20px; }

        /* Приветствие */
        .hello-section {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
        }
        .user-pfp {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: #ddd; margin-right: 15px;
            border: 1px solid #ccc;
        }

        .verified-icon { width: 24px; height: 24px; margin-left: 10px; }

        /* Заголовки секций */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 18px; font-weight: bold; margin-bottom: 12px;
        }
        .see-all { color: #0074BD; text-decoration: none; font-size: 13px; font-weight: normal; }

        /* Друзья (Кружочки) */
        .friends-row {
            display: flex; gap: 18px; overflow-x: auto;
            background: white; padding: 20px; border-radius: 5px; 
            border: 1px solid #DCDCDC; margin-bottom: 30px;
        }
        .friend-card { text-align: center; font-size: 12px; min-width: 65px; }
        .friend-img { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: #f0f0f0; border: 1px solid #eee; margin-bottom: 6px;
        }

        /* Сетка игр */
        .games-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .game-item { 
            background: white; padding: 8px; border-radius: 4px; 
            border: 1px solid #DCDCDC; transition: 0.2s;
        }
        .game-item:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .game-thumb { width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 3px; }
        .game-name { font-weight: bold; margin-top: 8px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-info { font-size: 11px; color: #777; margin-top: 4px; }

        /* Лента (Feed) */
        .feed-container {
            width: 400px; background: white; padding: 20px; 
            border-radius: 5px; border: 1px solid #DCDCDC;
        }
        .feed-post { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .feed-pfp { width: 45px; height: 45px; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: bold; font-size: 18px;">Home</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span>🔍</span>
            <span style="font-weight: bold;">(R$) 341</span>
            <span>⚙️</span>
        </div>
    </div>

    <nav class="nav-menu">
        <span style="cursor:pointer; font-size: 20px;">☰</span>
        <a href="#">Games</a>
        <a href="#">Catalog</a>
        <a href="#">Create</a>
        <input type="text" class="search-box" placeholder="Search">
    </nav>

    <div class="container">
        <div class="hello-section">
            <div class="user-pfp"><img src="default_avatar.png" id="my-avatar" style="width:100%; border-radius:50%;"></div>
            Hello, <span id="display-name">itzkokos</span>!
            <span id="verified-badge-place"></span>
        </div>

        <div class="section-header">
            Friends (0) <a href="#" class="see-all">See All</a>
        </div>
        <div class="friends-row">
            <div class="friend-card">
                <div class="friend-img"></div>
                <div>Add Friend</div>
            </div>
        </div>

        <div class="section-header">
            Recently Played <a href="#" class="see-all">See All</a>
        </div>
        <div class="games-grid">
            <div class="game-item">
                <div class="game-thumb"></div>
                <div class="game-name">Project Erablox</div>
                <div class="game-info">10 Playing | 2026</div>
            </div>
            </div>

        <div class="section-header">My Feed</div>
        <div class="feed-container">
            <div class="feed-post">
                <div class="feed-pfp"></div>
                <div>
                    <div style="font-weight: bold;">System</div>
                    <div style="font-size: 13px; margin: 5px 0;">Welcome to the new Erablox Home page!</div>
                    <div style="font-size: 10px; color: #999;">Apr 18, 2026 6:00 PM</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./auth.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);

                if (snap.exists()) {
                    const userData = snap.data();
                    
                    // Устанавливаем ник
                    document.getElementById('display-name').innerText = userData.username;

                    // Если есть синяя галочка
                    if (userData.isVerified) {
                        document.getElementById('verified-badge-place').innerHTML = 
                            `<img src="Verified.webp" class="verified-icon" title="Verified">`;
                    }
                }
            } else {
                // Если не залогинен — кидаем на страницу входа
                window.location.href = "/login.html"; 
            }
        });
    </script>
</body>
  </html>
