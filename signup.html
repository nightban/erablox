<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erablox - Sign Up</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #e1f5fe 0%, #03a9f4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #01579b;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 320px;
            border: 2px solid #b3e5fc;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #81d4fa;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #03a9f4;
            box-shadow: 0 0 8px rgba(3, 169, 244, 0.4);
        }

        .play-button {
            background: #0288d1;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .play-button:hover {
            background: #01579b;
            transform: scale(1.05);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #0277bd;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h1>ERABLOX</h1>
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" class="username-input" placeholder="Enter username...">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" class="password-input" placeholder="Min. 6 characters">
        </div>
        <button class="play-button">PLAY</button>
        <p class="footer-text">2016-2026 Erablox Project</p>
    </div>

    <script type="module">
        import { auth, db } from './auth.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const playBtn = document.querySelector('.play-button');
        const userInp = document.querySelector('.username-input');
        const passInp = document.querySelector('.password-input');

        playBtn.addEventListener('click', async () => {
            const username = userInp.value.trim();
            const password = passInp.value;

            if (username.length < 3 || password.length < 6) {
                alert("Ник от 3 символов, пароль от 6!");
                return;
            }

            try {
                // Регистрируем в Firebase
                const fakeEmail = `${username}@erablox.com`;
                const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, password);
                
                // Сохраняем ник в базу Firestore
                await setDoc(doc(db, "ErabloxUsers", userCredential.user.uid), {
                    username: username,
                    createdAt: new Date()
                });

                // Сохраняем ник в память браузера
                localStorage.setItem('erablox_username', username);

                // Летим на главную
                window.location.href = 'home.html';

            } catch (error) {
                alert("Ошибка: " + error.message);
            }
        });
    </script>
</body>
</html>
