<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application - Erablox</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000008; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .menu-icon { align-self: flex-start; border: 3px solid white; border-radius: 12px; padding: 8px; margin-bottom: 30px; }
        .bar { width: 35px; height: 5px; background: white; margin: 6px; border-radius: 2px; }
        
        .title { font-size: 56px; font-weight: 500; margin-bottom: 40px; }
        
        .input-group { width: 100%; max-width: 340px; margin-bottom: 25px; }
        label { display: block; font-size: 20px; margin-bottom: 15px; line-height: 1.2; }
        
        input { 
            width: 100%; height: 45px; border-radius: 10px; border: none; 
            padding: 0 15px; box-sizing: border-box; font-size: 18px; font-family: 'Montserrat';
        }

        .verify-box { 
            background-color: #5db3d5; width: 100%; max-width: 340px; 
            padding: 15px; border-radius: 5px; margin-bottom: 25px; box-sizing: border-box;
        }
        .verify-text { font-size: 32px; font-weight: 400; line-height: 1.1; color: white; }

        .send-btn { 
            background-color: #a3c9a1; color: white; border: none; 
            width: 100%; max-width: 340px; height: 55px; border-radius: 15px; 
            font-size: 52px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="menu-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>

    <h1 class="title">Application</h1>

    <div class="input-group">
        <label>enter information of yourself<br>(dont enter years, email)</label>
        <input type="text" placeholder="4000 characters only">
    </div>

    <div class="input-group">
        <label>enter link of your profile in roblox</label>
        <input type="text">
    </div>

    <label style="width: 100%; max-width: 340px;">enter this description in your roblox profile</label>
    <div class="verify-box">
        <div class="verify-text">erablox fly bird lava chicken</div>
    </div>

    <button class="send-btn">send</button>

    <script type="module">
        import { db } from './auth.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        document.querySelector('.send-btn').onclick = async () => {
            const inputs = document.querySelectorAll('input');
            const info = inputs[0].value;
            const link = inputs[1].value;

            if (!link) return alert("Enter link!");

            try {
                const docRef = await addDoc(collection(db, "ErabloxUsers"), {
                    description: info,
                    roblox_link: link,
                    status: "reviewing",
                    date: new Date().toLocaleDateString('ru-RU'),
                    time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
                });

                localStorage.setItem('last_app_id', docRef.id);
                window.location.href = 'reviewing.html';
            } catch (e) { alert("Error!"); }
        };
    </script>
</body>
</html>
